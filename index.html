<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIG Iquique</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020813; overflow: hidden; }

        .main-apple-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #020813;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            width: 300%;
            height: 100%;
            transform: translateX(0%);
            transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide-unit {
            width: 33.333%;
            height: 100%;
            position: relative;
            display: block;
            text-decoration: none;
            flex-shrink: 0;
        }

        .slide-unit img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .slide-overlay {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 60px 50px 55px 50px;
            background: linear-gradient(to top, rgba(2,8,19,0.95) 0%, rgba(2,8,19,0.4) 65%, transparent 100%);
            box-sizing: border-box;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .slide-overlay h3 {
            margin: 0 0 6px 0;
            font-size: 36px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .slide-overlay p {
            margin: 0;
            font-size: 16px;
            opacity: 0.85;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 0;
            transition: opacity 0.25s, background 0.2s, transform 0.2s;
        }

        .nav-btn svg { width: 22px; height: 22px; }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }

        .main-apple-container:hover .nav-btn { opacity: 1; }

        .nav-btn:hover {
            background: rgba(255,255,255,0.28);
            transform: translateY(-50%) scale(1.08);
        }

        .nav-btn:active { transform: translateY(-50%) scale(0.95); }

        .dots-bar {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            padding: 0;
            transition: background 0.3s, transform 0.3s;
            outline: none;
        }

        .dot.active {
            background: #fff;
            transform: scale(1.4);
        }

        .dot:hover:not(.active) {
            background: rgba(255,255,255,0.75);
        }
    </style>
</head>
<body>

<div class="main-apple-container">

    <div class="carousel-track" id="carouselTrack">

        <a href="https://sig-iquique.maps.arcgis.com/apps/instant/basic/index.html?appid=0adfb2d3d7234f98aa712403d977e07a" target="_blank" class="slide-unit">
            <img src="https://sig-iquique.maps.arcgis.com/sharing/rest/content/items/2f00e11814414f7782b6cd3dfe538ab1/data" alt="DOM">
            <div class="slide-overlay">
                <h3>Certificados aprobados DOM</h3>
                <p>Impulsando la creación de un polo de desarrollo territorial</p>
            </div>
        </a>

        <a href="https://sig-iquique.maps.arcgis.com/apps/instant/sidebar/index.html?appid=396b79eafee243aab353edc5ab4ffb01" target="_blank" class="slide-unit">
            <img src="https://sig-iquique.maps.arcgis.com/sharing/rest/content/items/4380490341134116829739928de6d5d7/data" alt="Educación">
            <div class="slide-overlay">
                <h3>Recintos Educacionales</h3>
                <p>Información territorial al servicio de todos los ciudadanos</p>
            </div>
        </a>

        <a href="https://arcg.is/180SiO3" target="_blank" class="slide-unit">
            <img src="https://sig-iquique.maps.arcgis.com/sharing/rest/content/items/93e21bd16d9840639ed526fd805bdbfe/data" alt="Plazas">
            <div class="slide-overlay">
                <h3>Plazas y Parques</h3>
                <p>Visualización espacial de parques y plazas de la ciudad</p>
            </div>
        </a>

    </div>

    <button class="nav-btn nav-prev" id="btnPrev" aria-label="Anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
    <button class="nav-btn nav-next" id="btnNext" aria-label="Siguiente">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>

    <div class="dots-bar">
        <button class="dot active" data-i="0"></button>
        <button class="dot" data-i="1"></button>
        <button class="dot" data-i="2"></button>
    </div>

</div>

<script>
(function () {
    const track   = document.getElementById('carouselTrack');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const dots    = document.querySelectorAll('.dot');
    const TOTAL   = 3;
    const DELAY   = 6000;
    let current   = 0;
    let timer     = null;

    function goTo(n) {
        current = (n + TOTAL) % TOTAL;
        track.style.transform = `translateX(-${current * 33.333}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === current));
    }

    function resetTimer() {
        clearInterval(timer);
        timer = setInterval(() => goTo(current + 1), DELAY);
    }

    btnPrev.addEventListener('click', (e) => { e.preventDefault(); goTo(current - 1); resetTimer(); });
    btnNext.addEventListener('click', (e) => { e.preventDefault(); goTo(current + 1); resetTimer(); });

    dots.forEach(d => {
        d.addEventListener('click', (e) => {
            e.preventDefault();
            goTo(parseInt(d.dataset.i));
            resetTimer();
        });
    });

    track.parentElement.addEventListener('mouseenter', () => clearInterval(timer));
    track.parentElement.addEventListener('mouseleave', () => resetTimer());

    goTo(0);
    resetTimer();
})();
</script>

</body>
